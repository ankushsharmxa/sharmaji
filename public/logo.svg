<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" width="260" height="50">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f52f8" />
      <stop offset="100%" stop-color="#003ad6" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon: Stylized shopping bag with lightning speed indicator -->
  <g transform="translate(5, 5)">
    <!-- Bag base -->
    <path d="M12,14 L28,14 L32,38 L8,38 Z" fill="url(#blueGrad)" rx="2" />
    <!-- Handle -->
    <path d="M15,14 C15,8 25,8 25,14" stroke="url(#accentGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Light speed line inside -->
    <path d="M15,22 L25,22 M13,28 L27,28 M17,34 L23,34" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- Logo Text -->
  <text x="50" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="800" fill="#0f52f8">
    Sharma<tspan fill="#ff6f00">Ji</tspan>
  </text>
  <text x="152" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#adb5bd" letter-spacing="2">
    STORE
  </text>
</svg>
